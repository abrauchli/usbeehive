[package]
name = "whatcable-linux"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Tells you what each USB cable/device on Linux can actually do. Rust port of WhatCable."
repository = "https://github.com/Zetaphor/whatcable-linux"
readme = "README.md"
rust-version = "1.74"

[[bin]]
name = "whatcable-linux"
path = "src/main.rs"

[lib]
name = "whatcable_linux"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
udev = { version = "0.9", optional = true }
libc = "0.2"

[features]
default = []
# `watch` enables the libudev hotplug monitor and `--watch` mode. Requires
# libudev development headers (libudev-dev / systemd-devel) at build time.
watch = ["dep:udev"]

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
