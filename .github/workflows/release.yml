name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Run JavaScript-based actions (e.g. actions/upload-artifact) on Node.js 24
# instead of the deprecated Node.js 20 runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --release --locked

      - name: Package CLI binary
        run: |
          mkdir -p target/dist
          cp target/release/usbeehive target/dist/
          cd target/dist
          tar czf ../usbeehive-${GITHUB_REF_NAME}-x86_64-linux.tar.gz usbeehive

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-assets
          path: |
            target/usbeehive-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Release Assets

            | File | Description |
            |------|-------------|
            | `usbeehive-${{ github.ref_name }}-x86_64-linux.tar.gz` | CLI binary. Extract and run `./usbeehive`. |

            ### Quick install

            ```bash
            tar xzf usbeehive-${{ github.ref_name }}-x86_64-linux.tar.gz
            sudo mv usbeehive /usr/local/bin/
            ```

            Or via Cargo:

            ```bash
            cargo install usbeehive
            ```
          files: |
            assets/**/*.tar.gz
